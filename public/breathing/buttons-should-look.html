<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimes Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

        /* Fallback for Google Sans */
        @font-face {
            font-family: 'Google Sans';
            src: local('Segoe UI'), local('Roboto'), local('Helvetica Neue'), local('Arial'), sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: #1A0A2E;
            overflow: hidden;
            font-family: 'Google Sans', sans-serif;
            color: white;
            user-select: none;
        }

        /* --- FLUID BACKGROUND --- */
        .fluid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: #1A0A2E;
        }

        .fluid-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            border-radius: 50%;
            animation: blobMorph 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.4) 0%, rgba(124, 77, 255, 0) 70%);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 191, 165, 0.3) 0%, rgba(0, 191, 165, 0) 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 128, 171, 0.2) 0%, rgba(255, 128, 171, 0) 70%);
            top: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes blobMorph {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(10vw, -10vh) scale(1.1);
            }

            66% {
                transform: translate(-10vw, 5vh) scale(0.9);
            }

            100% {
                transform: translate(5vw, 15vh) scale(1.05);
            }
        }

        /* --- MAIN CONTENT --- */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-container {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.3);
            overflow: hidden;
            position: relative;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- CARDS GRID --- */
        .cards-grid {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            padding: 0 24px;
            padding-bottom: 24px;
        }

        .card-container {
            flex: 1;
            max-width: 320px;
            aspect-ratio: 1 / 1.6;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s;
        }

        .card-container:hover {
            transform: translateY(-10px) scale(1.02);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* fallback */
        }

        .card-glow {
            position: absolute;
            top: 10%;
            left: 10%;
            right: 10%;
            bottom: 10%;
            border-radius: 32px;
            filter: blur(40px);
            z-index: -1;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .card-container:hover .card-glow {
            opacity: 0.8;
        }

        .card-bg,
        .card-graphic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            object-fit: cover;
            pointer-events: none;
        }

        .card-bg {
            filter: saturate(1.4) hue-rotate(-30deg);
        }

        .card-bg.pink-filter {
            filter: saturate(1.2) hue-rotate(-50deg);
        }

        .card-content {
            position: absolute;
            top: 28px;
            left: 28px;
            right: 28px;
            z-index: 2;
            pointer-events: none;
        }

        .card-title {
            font-family: 'Libre Baskerville', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.5px;
            white-space: pre-line;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .card-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(10px);
        }

        /* Responsive layout for smaller screens */
        @media (max-width: 900px) {
            .cards-grid {
                gap: 16px;
            }

            .card-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="fluid-bg">
        <div class="fluid-blob blob-1"></div>
        <div class="fluid-blob blob-2"></div>
        <div class="fluid-blob blob-3"></div>
    </div>

    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                    </polygon>
                </svg>
            </div>
            <div class="logo-container">
                <!-- Placeholder for logo image, defaulting to a solid color if not found -->
                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #7C4DFF, #00BFA5);"></div>
            </div>
            <div class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <script>
        const practiceCards = [
            {
                id: 'coherent', title: 'Resonant\nBreathing', type: 'Breathing',
                gradientBgAsset: 'assets/gradient-backgrounds/coherent-gradient-bg.png',
                graphicAsset: 'assets/cards-graphics/coherent.png',
                glowColor: '#26C6DA', pinkFilter: true
            },
            {
                id: 'psychosigh', title: 'Psychological\nSigh', type: 'Breathing',
                gradientBgAsset: 'assets/gradient-backgrounds/psychosigh-gradient-bg.png',
                graphicAsset: 'assets/cards-graphics/psychosigh.png',
                glowColor: '#FF80AB', pinkFilter: true
            },
            {
                id: 'box', title: 'Box\nBreathing', type: 'Breathing',
                gradientBgAsset: 'assets/gradient-backgrounds/box-gradient-bg.png',
                graphicAsset: 'assets/cards-graphics/box.png',
                glowColor: '#4A148C'
            }
        ];

        const cardsGrid = document.getElementById('cardsGrid');

        // Build the DOM
        practiceCards.forEach((card, index) => {
            // 1. Create Card
            const cardEl = document.createElement('div');
            cardEl.className = 'card-container';

            let filterClass = card.pinkFilter ? 'pink-filter' : '';
            let badgeText = card.type;

            cardEl.innerHTML = `
        <div class="card-inner">
          <div class="card-glow" style="background: ${card.glowColor}"></div>
          <img class="card-bg ${filterClass}" src="${card.gradientBgAsset}" alt="bg" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII='">
          <img class="card-graphic" src="${card.graphicAsset}" alt="graphic" onerror="this.style.display='none'">
          <div class="card-content">
            <div class="card-title">${card.title.replace('\n', '<br>')}</div>
            <div class="card-badge">${badgeText}</div>
          </div>
        </div>
      `;

            // Event listener for click
            cardEl.addEventListener('click', () => {
                let targetId = card.id === 'coherent' ? 'resonant' : (card.id === 'psychosigh' ? 'sigh' : 'box');
                window.location.href = `breathing_animations.html?mode=${targetId}`;
            });

            cardsGrid.appendChild(cardEl);
        });
    </script>
</body>

</html>
