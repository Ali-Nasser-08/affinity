<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathing Animations</title>
<style>
  body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: #000; overflow: hidden; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    color: white; 
    user-select: none;
  }
  #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  
  .ui-overlay { 
    position: absolute; z-index: 10; width: 100%; height: 100%; 
    pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; 
  }
  
  .tabs { 
    flex: 0; display: flex; justify-content: center; padding: 40px 20px; pointer-events: auto; flex-wrap: wrap; gap: 10px;
  }
  
  .tab { 
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); 
    color: white; padding: 12px 24px; cursor: pointer; border-radius: 30px; 
    text-transform: uppercase; font-size: 14px; letter-spacing: 1.5px; 
    backdrop-filter: blur(10px); transition: all 0.3s; 
  }
  .tab:hover { background: rgba(255,255,255,0.2); }
  .tab.active { background: rgba(255,255,255,0.9); color: black; border-color: white; font-weight: bold; }
  
  .info-text { text-align: center; padding-bottom: 15%; pointer-events: none; }
  .countdown { font-size: 80px; font-weight: 300; margin-bottom: 8px; font-family: 'Segoe UI', sans-serif; }
  .phase-label { font-size: 36px; font-weight: bold; font-family: 'Georgia', serif; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="animCanvas"></canvas>
</div>

<div class="ui-overlay">
  <div class="tabs">
    <div class="tab active" onclick="switchMode('resonant')" id="tab-resonant">Resonant</div>
    <div class="tab" onclick="switchMode('sigh')" id="tab-sigh">Psychological Sigh</div>
    <div class="tab" onclick="switchMode('box')" id="tab-box">Box Breathing</div>
  </div>
  
  <div class="info-text">
    <div class="countdown" id="countdownEl">0</div>
    <div class="phase-label" id="phaseEl">Phase</div>
  </div>
</div>

<script>
const canvas = document.getElementById('animCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let width, height;

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// UI Elements
const countdownEl = document.getElementById('countdownEl');
const phaseEl = document.getElementById('phaseEl');

// Global State
let currentMode = 'resonant';
let sessionStartTime = performance.now();
let lastTick = performance.now();
let animationFrameId;

// Utility Math
const random = (min, max) => Math.random() * (max - min) + min;
const lerp = (a, b, t) => a + (b - a) * t;
const hexToRgb = hex => {
  let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return [r,g,b];
}
const lerpColor = (c1, c2, t) => {
  const [r1, g1, b1] = hexToRgb(c1);
  const [r2, g2, b2] = hexToRgb(c2);
  const r = Math.round(lerp(r1, r2, t));
  const g = Math.round(lerp(g1, g2, t));
  const b = Math.round(lerp(b1, b2, t));
  return `rgb(${r},${g},${b})`;
}
const lerpColorRgba = (c1, c2, t, a) => {
  const [r1, g1, b1] = hexToRgb(c1);
  const [r2, g2, b2] = hexToRgb(c2);
  const r = Math.round(lerp(r1, r2, t));
  const g = Math.round(lerp(g1, g2, t));
  const b = Math.round(lerp(b1, b2, t));
  return `rgba(${r},${g},${b},${a})`;
}
const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

// ==========================================
// RESONANT BREATHING
// ==========================================
class ResonantBreathing {
  constructor() {
    this.cycleDuration = 12.0; // 6s inhale, 6s exhale
    this.particles = [];
    this.circles = [];
    this.motionValue = 0;
    this.colors = { dark: '#006064', mid: '#0097A7', light: '#00BFA5' };
    this.prevPhase = 'inhale';
  }

  update(dt, time) {
    let cycleTime = time % this.cycleDuration;
    let progress = time / this.cycleDuration;
    let phase = cycleTime < 6.0 ? 'inhale' : 'exhale';
    let phaseTime = cycleTime < 6.0 ? cycleTime : cycleTime - 6.0;
    
    // Wave sine value: smooth 0 to 1 back to 0
    let sineValue = (Math.sin(progress * 2 * Math.PI - Math.PI / 2) + 1) / 2;
    this.motionValue += dt * 0.2; // 2 sec cycle speed approximately

    if (phase !== this.prevPhase) {
      if (phase === 'exhale') {
        this.explodeParticles();
      }
      this.prevPhase = phase;
    }

    // Spawn Particles & Circles during inhale
    if (phase === 'inhale') {
      if (Math.random() < 0.15) {
        this.particles.push({
          x: width * 0.2 + Math.random() * width * 0.6,
          y: height + 20,
          vx: (Math.random() - 0.5) * 1.5,
          vy: -2 - Math.random() * 4,
          life: 1.0,
          size: 3 + Math.random() * 5,
          isRising: true,
          isStar: false
        });
      }
      if (this.circles.length === 0 || (this.circles[this.circles.length - 1].radius > 60 && Math.random() < 0.05)) {
        this.circles.push({ radius: 0, maxRadius: Math.max(width, height) * 0.7, opacity: 0.5 });
      }
    }

    // Update Particles
    const targetWaveY = height * 0.5 - (sineValue * height * 0.25);
    for (let i = this.particles.length - 1; i >= 0; i--) {
      let p = this.particles[i];
      if (p.isRising && !p.isStar) {
        p.x += p.vx + Math.sin(time * 5) * 0.3;
        p.y += p.vy;
        p.vy *= 0.99;
        if (p.y < targetWaveY) {
          p.y = targetWaveY;  
          p.vy = 0;
          p.life -= 0.01;
        }
      } else if (p.isStar) {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.92;
        p.vy *= 0.92;
        p.life -= 0.02;
      }
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    // Update Circles
    for (let i = this.circles.length - 1; i >= 0; i--) {
      let c = this.circles[i];
      if (phase === 'inhale') {
        c.radius += 2.0;
        c.opacity = 0.5 * (1.0 - (c.radius / c.maxRadius));
      } else {
        c.radius -= 3.0;
        if (c.radius < 0) c.radius = 0;
        c.opacity *= 0.9;
      }
      if (c.opacity <= 0.01 || (c.radius <= 0.1 && phase === 'exhale')) {
        this.circles.splice(i, 1);
      }
    }

    this.draw(sineValue, phase, phaseTime);
    this.updateUI(phase, 6 - Math.floor(phaseTime));
  }

  explodeParticles() {
    let newP = [];
    for (let p of this.particles) {
      if (!p.isStar && p.y < height) {
        let count = 8 + Math.floor(Math.random() * 5);
        for (let i = 0; i < count; i++) {
          let angle = Math.random() * 2 * Math.PI;
          let speed = 2 + Math.random() * 6;
          newP.push({
            x: p.x, y: p.y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 0.8 + Math.random() * 0.4,
            size: 2 + Math.random() * 2,
            isRising: false, isStar: true
          });
        }
        p.life = 0;
      }
    }
    this.particles.push(...newP);
  }

  draw(sineValue, phase, phaseTime) {
    ctx.fillStyle = this.colors.dark;
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.lineCap = 'round';
    
    // Draw Expanding Circles
    let waveColor = lerpColor(this.colors.dark, this.colors.light, sineValue);
    for (let c of this.circles) {
      if (c.radius < 1) continue;
      ctx.beginPath();
      ctx.arc(width/2, height/2, c.radius, 0, Math.PI * 2);
      ctx.strokeStyle = lerpColorRgba(this.colors.dark, this.colors.light, sineValue, c.opacity);
      ctx.lineWidth = 2 + (c.opacity * 2);
      ctx.stroke();
    }

    // Paint Wave
    const centerY = height * 0.5;
    const dy = lerp(centerY + height * 0.25, centerY - height * 0.25, sineValue);
    
    this.drawWaveLayer(dy, lerpColorRgba(this.colors.dark, this.colors.light, sineValue, 0.2), 1.0, this.motionValue);
    this.drawWaveLayer(dy + 10, lerpColorRgba(this.colors.dark, this.colors.light, sineValue, 0.4), 0.8, this.motionValue + 0.3);
    this.drawWaveLayer(dy + 20, waveColor, 1.0, this.motionValue + 0.6);
    this.drawGlowLine(dy + 20, waveColor, this.motionValue + 0.6);

    // Draw Particles
    for (let p of this.particles) {
      if (p.life <= 0) continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      if (p.isStar) {
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, p.life))})`;
      } else {
        const [r, g, b] = hexToRgb(this.colors.light);
        ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
      }
      ctx.fill();
    }
    
    ctx.restore();
  }

  drawWaveLayer(yBase, color, ampMult, phase) {
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(0, yBase);
    for (let x = 0; x <= width; x += 10) {
      let nx = x / width;
      let y = yBase + 
              Math.sin(nx * 2 * Math.PI + phase * 2 * Math.PI) * 15 * ampMult + 
              Math.sin(nx * 4 * Math.PI - phase * 4 * Math.PI) * 5;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(width, height);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  drawGlowLine(yBase, color, phase) {
    ctx.beginPath();
    for (let x = 0; x <= width; x += 10) {
      let nx = x / width;
      let y = yBase + 
              Math.sin(nx * 2 * Math.PI + phase * 2 * Math.PI) * 15 + 
              Math.sin(nx * 4 * Math.PI - phase * 4 * Math.PI) * 5;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    
    // Core line
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.stroke();
    
    // Glow
    ctx.strokeStyle = color;
    ctx.lineWidth = 15;
    ctx.globalAlpha = 0.3;
    ctx.stroke();
    ctx.globalAlpha = 1.0;
  }

  updateUI(phase, rem) {
    countdownEl.innerText = Math.max(0, rem);
    phaseEl.innerText = phase === 'inhale' ? 'Breathe in' : 'Breathe out';
  }
}

// ==========================================
// PSYCHOLOGICAL SIGH
// ==========================================
class PsychologicalSigh {
  constructor() {
    this.cycleDuration = 11.5; // 3.0 + 2.0 + 6.5
    this.inhale1D = 3.0;
    this.inhale2D = 2.0;
    this.exhaleD = 6.5;
    
    this.particles = [];
    this.outlines = [];
    this.wavyLines = [];
    this.colors = { red: '#FFA0A0', pink: '#FF7EC7' };
    this.prevPhase = 'inhale1';
    
    this.initVisuals();
  }
  
  initVisuals() {
    // 3 Concentric Outlines
    const maxR = Math.max(width, height) * 0.45;
    for (let i = 0; i < 3; i++) {
      this.outlines.push({ maxRadius: maxR + (i * 40), currentRadius: 0, opacity: 0.0 });
    }
    // Wavy Lines (Floral shapes)
    for (let i = 0; i < 5; i++) {
        this.wavyLines.push({
            phase: random(0, Math.PI * 2),
            amplitude: random(15, 35),
            speed: random(0.005, 0.015),
            opacity: 0.0
        });
    }
  }

  update(dt, time) {
    let cycleTime = time % this.cycleDuration;
    
    let phase = 'inhale1';
    if (cycleTime >= this.inhale1D && cycleTime < this.inhale1D + this.inhale2D) phase = 'inhale2';
    else if (cycleTime >= this.inhale1D + this.inhale2D) phase = 'exhale';
    
    if (phase !== this.prevPhase) {
      if (phase === 'exhale') this.explodeCircles();
      this.prevPhase = phase;
    }
    
    // Update Particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      let p = this.particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.98; p.vy *= 0.98;
      p.x += (Math.random() - 0.5) * 0.5;
      p.y += (Math.random() - 0.5) * 0.5;
      p.life -= (1.0 / (60 * 7.5)); // 60fps * 7.5s
      if (p.life <= 0) this.particles.splice(i, 1);
    }
    
    // Update Outlines
    for (let o of this.outlines) {
      if (phase.startsWith('inhale')) {
        o.currentRadius += (o.maxRadius - o.currentRadius) * 0.02;
        o.opacity += (0.3 - o.opacity) * 0.05;
      } else {
        o.currentRadius *= 0.99;
        o.opacity *= 0.95;
      }
    }
    
    // Update Wavy Lines
    for (let w of this.wavyLines) {
      w.phase += w.speed;
      if (phase.startsWith('inhale')) {
        w.opacity += (0.4 - w.opacity) * 0.05;
      } else {
        w.opacity *= 0.98;
      }
    }
    
    // Progress computations
    let inhale1Progress = 0, inhale2Progress = 0;
    if (phase === 'inhale1') {
      inhale1Progress = easeOut(cycleTime / this.inhale1D);
    } else if (phase === 'inhale2') {
      inhale1Progress = 1.0;
      inhale2Progress = easeOut((cycleTime - this.inhale1D) / this.inhale2D);
    }
    
    this.draw(phase, inhale1Progress, inhale2Progress);
    
    let rem = 0;
    if (phase === 'inhale1') rem = Math.ceil(this.inhale1D - cycleTime);
    else if (phase === 'inhale2') rem = Math.ceil(this.inhale2D - (cycleTime - this.inhale1D));
    else rem = Math.ceil(this.exhaleD - (cycleTime - this.inhale1D - this.inhale2D));
    this.updateUI(phase, Math.max(1, rem));
  }
  
  explodeCircles() {
    const cx = width / 2;
    const cy = height / 2;
    const maxR1 = Math.min(width, height) * 0.35;
    const maxR2 = Math.min(width, height) * 0.45;
    
    let genParticles = (count, maxR, baseSpeed) => {
      for (let i = 0; i < count; i++) {
        let r = Math.sqrt(Math.random()) * maxR;
        let theta = Math.random() * 2 * Math.PI;
        let x = cx + r * Math.cos(theta);
        let y = cy + r * Math.sin(theta);
        let spd = baseSpeed + Math.random() * 1.5;
        this.particles.push({
          x: x, y: y,
          vx: Math.cos(theta) * spd,
          vy: Math.sin(theta) * spd,
          life: 1.2 + Math.random() * 0.5,
          size: 1.0 + Math.random() * 2.0,
          color: this.colors.red
        });
      }
    }
    genParticles(600, maxR1, 0.2);
    genParticles(900, maxR2, 0.5);
  }

  draw(phase, prog1, prog2) {
    ctx.fillStyle = '#110a11'; // Very dark tint of purple/pink
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    const cx = width / 2;
    const cy = height / 2;

    // Wavy Lines (floral petal outlines)
    ctx.lineCap = 'round';
    ctx.lineWidth = 2.0;
    for (let w of this.wavyLines) {
      if (w.opacity <= 0.01) continue;
      ctx.strokeStyle = `rgba(255,255,255,${w.opacity})`;
      ctx.beginPath();
      const k = 4.0;
      const scale = Math.min(width, height) * 0.35;
      for (let theta = 0; theta <= Math.PI * 2 + 0.1; theta += 0.05) {
        let r = Math.min(width, height) * 0.15 + (scale * 0.5) * (0.5 + 0.5 * Math.sin(k * theta + w.phase));
        let x = cx + r * Math.cos(theta);
        let y = cy + r * Math.sin(theta);
        if (theta === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    // Concentric Outlines
    ctx.lineWidth = 1.0;
    for (let o of this.outlines) {
      if (o.opacity <= 0.01) continue;
      ctx.strokeStyle = lerpColorRgba(this.colors.pink, this.colors.pink, 0, o.opacity);
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(0.1, o.currentRadius), 0, Math.PI * 2);
      ctx.stroke();
    }

    const maxR1 = Math.min(width, height) * 0.28;
    const maxR2 = Math.min(width, height) * 0.45;

    // Inhale 2 Ripples
    if (phase !== 'exhale' && prog2 > 0) {
      ctx.lineWidth = 1.5;
      for (let i = 1; i <= 10; i++) {
        let targetR = maxR1 + (maxR2 * 1.2 - maxR1) * (i / 10);
        let currentR = maxR1 + (targetR - maxR1) * prog2;
        let op = Math.max(0, Math.min(1, 0.5 * prog2));
        ctx.strokeStyle = lerpColorRgba(this.colors.red, '#000', 0, op);
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(0.1, currentR), 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Inhale 1 Solid Circle
    if (phase !== 'exhale') {
      let r1 = maxR1 * prog1;
      ctx.fillStyle = this.colors.red;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(0.1, r1), 0, Math.PI * 2);
      ctx.fill();
      
      // Glow
      const glowGrad = ctx.createRadialGradient(cx, cy, r1*0.8, cx, cy, r1*1.5);
      glowGrad.addColorStop(0, lerpColorRgba(this.colors.red, '#000', 0, 0.6));
      glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(0.1, r1*1.5), 0, Math.PI * 2);
      ctx.fill();
    }

    // Exhale Particles
    for (let p of this.particles) {
      if (p.life <= 0) continue;
      ctx.fillStyle = lerpColorRgba(p.color, '#000', 0, Math.min(1, Math.max(0, p.life)));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  updateUI(phase, rem) {
    countdownEl.innerText = rem;
    if (phase === 'inhale1') phaseEl.innerText = 'Inhale (1)';
    else if (phase === 'inhale2') phaseEl.innerText = 'Inhale (2)';
    else phaseEl.innerText = 'Exhale';
  }
}

// ==========================================
// BOX BREATHING
// ==========================================
class BoxBreathing {
  constructor() {
    this.cycleDuration = 16.0; // 4 * 4s
    this.colors = { p: '#7C4DFF', dp: '#311B92', lp: '#B388FF' };
    this.stars = [];
    this.glows = [];
    this.shapes = [];
    this.lines = [];
    this.expandingSquares = [];
    this.prevPhase = 'inhale';
    this.globalRotation = 0;
    
    this.initVisuals();
  }
  
  initVisuals() {
    const sw = Math.max(width, height);
    for (let i = 0; i < 80; i++) {
      this.stars.push({
        x: random(0, width), y: random(0, height),
        op: random(0, 0.5), tgOp: random(0.3, 1.0), spd: random(0.01, 0.03)
      });
    }
    for (let i = 0; i < 6; i++) {
      this.glows.push({
        x: random(0, width), y: random(0, height),
        r: random(80, 230), op: random(0.1, 0.3), tgOp: random(0.15, 0.35)
      });
    }
    for (let i = 0; i < 80; i++) {
        const sidesList = [0, 3, 4, 5, 6, 8, 12];
        this.shapes.push({
            x: random(0, width), y: random(0, height),
            vx: random(-0.4, 0.4), vy: random(-0.4, 0.4),
            size: random(15, 115),
            sides: sidesList[Math.floor(Math.random() * sidesList.length)],
            rot: random(0, Math.PI * 2),
            rs: random(-0.01, 0.01),
            op: random(0.05, 0.25)
        });
    }
    for (let i = 0; i < 12; i++) {
      this.lines.push({
        ph: random(0, Math.PI * 2), amp: random(20, 60),
        yPos: random(0, 1), op: random(0.1, 0.3), spd: random(0.008, 0.023),
        wc: Math.floor(random(2, 5))
      });
    }
  }

  update(dt, time) {
    let cycleTime = time % this.cycleDuration;
    let phaseTime = cycleTime % 4.0;
    
    let phase = 'inhale';
    let phaseIndex = 0;
    if (cycleTime < 4) { phase = 'inhale'; phaseIndex = 0; }
    else if (cycleTime < 8) { phase = 'hold1'; phaseIndex = 1; }
    else if (cycleTime < 12) { phase = 'exhale'; phaseIndex = 2; }
    else { phase = 'hold2'; phaseIndex = 3; }
    
    let isHold = phase.startsWith('hold');

    if (phase !== this.prevPhase) {
      if (phase === 'inhale' || phase === 'exhale') {
        this.spawnSquares();
      }
      this.prevPhase = phase;
    }

    let phaseProg = phaseTime / 4.0;
    let traceProg = phaseIndex + phaseProg;
    
    let squareScale = 1.0;
    if (phase === 'inhale') squareScale = 1.0 + 0.15 * easeInOut(phaseProg);
    else if (phase === 'exhale') squareScale = 1.15 - 0.15 * easeInOut(phaseProg);
    else if (phase === 'hold1') squareScale = 1.15;
    else squareScale = 1.0;

    if (!isHold) {
       this.globalRotation += dt * 0.05; // 2 min full rotation
       
       // Stars
       for (let s of this.stars) {
         if (Math.abs(s.op - s.tgOp) < 0.05) s.tgOp = 0.2 + Math.random() * 0.8;
         s.op += (s.tgOp - s.op) * s.spd;
       }
       // Glows
       for (let g of this.glows) {
         g.op += (g.tgOp - g.op) * 0.01;
         if (Math.random() < 0.005) g.tgOp = 0.1 + Math.random() * 0.25;
       }
       // Shapes
       for (let s of this.shapes) {
         s.x += s.vx; s.y += s.vy; s.rot += s.rs;
         if (s.x < -s.size) s.x = width + s.size;
         if (s.x > width + s.size) s.x = -s.size;
         if (s.y < -s.size) s.y = height + s.size;
         if (s.y > height + s.size) s.y = -s.size;
       }
       // Lines
       for (let l of this.lines) {
         l.ph += l.spd;
       }
    }

    // Expanding Squares
    for (let i = this.expandingSquares.length - 1; i >= 0; i--) {
      let sq = this.expandingSquares[i];
      if (phase === 'inhale') {
        sq.r += (sq.maxR - sq.r) * 0.015; sq.rot += 0.001; sq.life -= 0.003;
      } else if (phase === 'exhale') {
        sq.r *= 0.985; sq.rot -= 0.001; sq.life -= 0.002;
      } else {
        sq.life -= 0.001;
      }
      sq.curOp = sq.baseOp * Math.max(0, sq.life);
      if (sq.life <= 0.01 || sq.curOp < 0.01) this.expandingSquares.splice(i, 1);
    }
    
    this.draw(traceProg, squareScale);
    
    let rem = Math.ceil(4 - phaseTime) || 1;
    this.updateUI(phase, rem);
  }
  
  spawnSquares() {
    if (this.expandingSquares.length > 30) this.expandingSquares.splice(0, 10);
    const sw = Math.max(width, height);
    for (let i = 0; i < 12; i++) {
        this.expandingSquares.push({
            r: 30 + i * 12.0, maxR: sw * 0.8 + i * 50,
            baseOp: 0.7 - i * 0.04, curOp: 0,
            rot: i * 0.1, life: 1.0
        });
    }
  }

  draw(traceProg, sqScale) {
    ctx.fillStyle = '#0a0515'; // Very dark base
    ctx.fillRect(0, 0, width, height);
    
    const [dpr, dpg, dpb] = hexToRgb(this.colors.dp);
    
    ctx.save();
    
    // Glows
    for (let g of this.glows) {
       let grad = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r);
       grad.addColorStop(0, `rgba(${dpr},${dpg},${dpb},${g.op})`);
       grad.addColorStop(1, 'rgba(0,0,0,0)');
       ctx.fillStyle = grad;
       ctx.beginPath();
       ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
       ctx.fill();
    }
    
    // Shapes
    ctx.lineWidth = 1.0;
    const [lpr, lpg, lpb] = hexToRgb(this.colors.lp);
    for (let s of this.shapes) {
       ctx.strokeStyle = `rgba(${lpr},${lpg},${lpb},${s.op})`;
       ctx.save();
       ctx.translate(s.x, s.y);
       ctx.rotate(s.rot);
       ctx.beginPath();
       if (s.sides === 0) {
           ctx.arc(0, 0, s.size/2, 0, Math.PI*2);
       } else {
           for (let i = 0; i <= s.sides; i++) {
               let angle = (i / s.sides) * Math.PI * 2 - Math.PI / 2;
               let hx = (s.size / 2) * Math.cos(angle);
               let hy = (s.size / 2) * Math.sin(angle);
               if (i === 0) ctx.moveTo(hx, hy);
               else ctx.lineTo(hx, hy);
           }
       }
       ctx.stroke();
       ctx.restore();
    }
    
    // Lines
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    for (let l of this.lines) {
       ctx.strokeStyle = `rgba(${lpr},${lpg},${lpb},${l.op})`;
       ctx.beginPath();
       let yb = height * l.yPos;
       for (let x = 0; x <= width; x += 10) {
           let nx = x / width;
           let y = yb + Math.sin(nx * Math.PI * l.wc + l.ph) * l.amp + Math.sin(nx * Math.PI * l.wc * 2 - l.ph * 0.7) * (l.amp * 0.5);
           if (x === 0) ctx.moveTo(x, y);
           else ctx.lineTo(x, y);
       }
       ctx.stroke();
    }
    
    // Stars
    ctx.fillStyle = '#FFF';
    for (let s of this.stars) {
        ctx.globalAlpha = s.op * 0.5;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;

    const cx = width / 2;
    const cy = height / 2;
    
    // Expanding Squares
    const [pr, pg, pb] = hexToRgb(this.colors.p);
    for (let sq of this.expandingSquares) {
        if (sq.curOp <= 0.01) continue;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(sq.rot);
        
        // Glow
        ctx.strokeStyle = `rgba(${lpr},${lpg},${lpb},${sq.curOp * 0.3})`;
        ctx.lineWidth = 8.0;
        ctx.strokeRect(-sq.r/2, -sq.r/2, sq.r, sq.r);
        
        // Main
        ctx.strokeStyle = `rgba(${pr},${pg},${pb},${sq.curOp})`;
        ctx.lineWidth = 3.5;
        ctx.strokeRect(-sq.r/2, -sq.r/2, sq.r, sq.r);
        ctx.restore();
    }
    
    // Main Box
    const baseSqSize = Math.min(width, height) * 0.45;
    const sqSize = baseSqSize * sqScale;
    const half = sqSize / 2;
    
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.globalRotation);
    
    const p1 = {x: -half, y: -half};
    const p2 = {x: half, y: -half};
    const p3 = {x: half, y: half};
    const p4 = {x: -half, y: half};
    
    // Base Box
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 5.0;
    ctx.lineJoin = 'round';
    ctx.strokeRect(-half, -half, sqSize, sqSize);
    
    // Trace
    ctx.strokeStyle = this.colors.p;
    ctx.lineWidth = 7.0;
    
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    
    const lerpPt = (a, b, t) => ({ x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t) });
    let cPos;
    
    if (traceProg >= 0) {
        let tp = Math.min(1.0, traceProg);
        cPos = lerpPt(p1, p2, tp);
        ctx.lineTo(cPos.x, cPos.y);
    }
    if (traceProg >= 1) {
        let tp = Math.min(1.0, traceProg - 1);
        cPos = lerpPt(p2, p3, tp);
        ctx.lineTo(cPos.x, cPos.y);
    }
    if (traceProg >= 2) {
        let tp = Math.min(1.0, traceProg - 2);
        cPos = lerpPt(p3, p4, tp);
        ctx.lineTo(cPos.x, cPos.y);
    }
    if (traceProg >= 3) {
        let tp = Math.min(1.0, traceProg - 3);
        cPos = lerpPt(p4, p1, tp);
        ctx.lineTo(cPos.x, cPos.y);
    }
    ctx.stroke();
    
    // Trace dot
    if (cPos) {
        ctx.beginPath();
        let grad = ctx.createRadialGradient(cPos.x, cPos.y, 0, cPos.x, cPos.y, 15);
        grad.addColorStop(0, `rgba(${lpr},${lpg},${lpb},0.8)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.arc(cPos.x, cPos.y, 20, 0, Math.PI*2);
        ctx.fill();
        
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(cPos.x, cPos.y, 10, 0, Math.PI*2);
        ctx.fill();
    }
    
    ctx.restore();

    ctx.restore();
  }
  
  updateUI(phase, rem) {
    countdownEl.innerText = rem;
    if (phase === 'inhale') phaseEl.innerText = 'Breathe in';
    else if (phase === 'exhale') phaseEl.innerText = 'Breathe out';
    else phaseEl.innerText = 'Hold';
  }
}

// ==========================================
// APP LOGIC
// ==========================================

let engines = {
  'resonant': new ResonantBreathing(),
  'sigh': new PsychologicalSigh(),
  'box': new BoxBreathing()
};

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');
  
  // reset animation clock for new mode
  sessionStartTime = performance.now();
  engines[mode].initVisuals && engines[mode].initVisuals(); // re-init if available
}

function loop(timestamp) {
  const dt = (timestamp - lastTick) / 1000;
  lastTick = timestamp;
  const elapsed = (timestamp - sessionStartTime) / 1000;
  
  // Clear canvas entirely
  ctx.clearRect(0,0,width,height);
  
  engines[currentMode].update(dt, elapsed);
  
  animationFrameId = requestAnimationFrame(loop);
}

// Start
animationFrameId = requestAnimationFrame(loop);

</script>
